name: autorisen

services:
  backend:
    build:
      context: .
      target: backend # uses the "backend" stage from Dockerfile
    command: sh -lc "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env.development.local
    environment:
      # Local DB/Redis URLs (override via env if needed)
      DATABASE_URL: postgresql://${POSTGRES_USER:-autorisen}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-autorisen}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend # live code reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [app-net]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend # uses the "frontend" stage from Dockerfile
    env_file:
      - .env.development.local # expose only VITE_* (Vite) or REACT_APP_* (CRA)
    environment:
      INSIDE_DOCKER: "true"
    volumes:
      - ./client:/app # live UI reload
      - node_modules_frontend:/app/node_modules # keep deps inside container
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: ["sh", "-lc", "npm run dev -- --host 0.0.0.0 --port 3000"]
    restart: unless-stopped
    networks: [app-net]

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autorisen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-autorisen}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # matches your Makefile psql (localhost:5433)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [app-net]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app-net]

  pgadmin:
    image: dpage/pgadmin4:8
    profiles: ["tools"] # start with: `docker compose --profile tools up -d`
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks: [app-net]

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    profiles: ["tools"]
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks: [app-net]

volumes:
  pg_data:
  redis_data:
  node_modules_frontend:

networks:
  app-net:
    driver: bridge
