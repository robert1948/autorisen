name: Publish Docker image to Docker Hub

on:
  push:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (release stage)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          target: release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            stinkie/autorisen:latest
            stinkie/autorisen:${{ github.sha }}
            stinkie/autorisen:${{ github.ref_name }}
          cache-from: type=registry,ref=stinkie/autorisen:latest
          cache-to: type=registry,mode=max,ref=stinkie/autorisen:buildcache

      - name: Verify pushed tags
        run: |
          echo "Pushed stinkie/autorisen:latest and stinkie/autorisen:${GITHUB_SHA}"
